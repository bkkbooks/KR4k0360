body:
  text: 朱鳳晉書文帝文王諱昭字子上宣帝次子也世說注一元帝元帝諱叡字景文祖伷封琅邪王父恭王墐嗣帝襲爵琅邪王少而明惠因亂過江起義遂即皇帝位世說注二謚法曰始建國都曰元同上安平王孚魏文帝立以司馬孚為度支尚書軍糧計校一皆由之書鈔御覽二百十七彭城王權彭城穆王權字子輿宣帝弟馗子太始元年封世說注六梁王彤梁孝王彤字子徽宣帝張夫人生世說注一位至太宰世說注一齊王攸咸寧詔齊王攸之朝車設旗書鈔趙王倫字子彝宣帝桓夫人生趙王倫世說注倫請三萬人往平齊萬年朝議不許文選關中詩注位至相國世說注一陳輿騫之子為左軍以父老求去職宿衛不宜曠詔以為通直常侍陳輿御覽二百二十四前後徙河北諸郡縣居山間謂之羯胡文選齊安陸昭王碑文注
